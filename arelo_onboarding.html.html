<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arelo — Welcome</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='og' cx='35%' cy='35%' r='65%'><stop offset='0%' stop-color='%23ffffff'/><stop offset='35%' stop-color='%23b8e8e8'/><stop offset='70%' stop-color='%235bbfbf'/><stop offset='100%' stop-color='%232a8080'/></radialGradient></defs><ellipse cx='16' cy='16' rx='14' ry='14' fill='url(%23og)'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy:       #3d5a7a;
  --navy-dark:  #1e2e3e;
  --navy-mid:   #2c4260;
  --teal:       #5bbfbf;
  --teal-dark:  #3a9090;
  --teal-glow:  rgba(91,191,191,0.35);
  --teal-soft:  rgba(91,191,191,0.12);
  --surface:    rgba(255,255,255,0.06);
  --surface-up: rgba(255,255,255,0.10);
  --ink:        #ffffff;
  --muted:      rgba(255,255,255,0.55);
  --line:       rgba(255,255,255,0.09);
  --r-lg:       20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: 'Atkinson Hyperlegible', sans-serif;
  background: var(--navy-dark); color: var(--ink); overflow: hidden;
}

/* ── BG ── */
.bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 60% 55% at 15% 85%, rgba(91,191,191,0.1) 0%, transparent 65%),
    radial-gradient(ellipse 45% 40% at 90% 8%, rgba(61,90,122,0.5) 0%, transparent 60%),
    linear-gradient(160deg, #0c1825 0%, #1e2e3e 55%, #0f1c2b 100%);
}
.bg::after {
  content:''; position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.015) 60px),
    repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.015) 60px);
  animation:meshDrift 25s linear infinite;
}
@keyframes meshDrift{from{transform:translateY(0)}to{transform:translateY(60px)}}

/* ── LAYOUT ── */
.page {
  position:relative; z-index:1;
  height:100vh; display:flex; flex-direction:column;
  max-width:720px; margin:0 auto;
  padding:0 20px;
}

/* ── HEADER ── */
.top-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 0 16px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-orb {
  width:32px; height:32px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff 0%,#b8e8e8 30%,#5bbfbf 65%,#2a8080 100%);
  box-shadow:0 0 16px rgba(91,191,191,0.35); flex-shrink:0;
}
.logo-text { font-family:'Nunito',sans-serif; font-weight:800; font-size:18px; color: #fff; }
.progress-wrap { display:flex; align-items:center; gap:12px; }
.progress-steps { display:flex; gap:6px; }
.prog-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--line); transition:background .3s, transform .3s;
}
.prog-dot.done { background:var(--teal-dark); }
.prog-dot.active { background:var(--teal); transform:scale(1.3); box-shadow:0 0 8px var(--teal-glow); }
.progress-label { font-size:12px; color:var(--muted); white-space:nowrap; }

/* ── CHAT AREA ── */
.chat-area {
  flex:1; overflow-y:auto; padding:24px 0 16px;
  display:flex; flex-direction:column; gap:16px;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
}
.chat-area::-webkit-scrollbar { width:4px; }
.chat-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

/* ── MESSAGES ── */
.msg { display:flex; gap:12px; animation:msgIn .35s cubic-bezier(.22,1,.36,1) both; max-width:88%; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.msg.arelo { align-self:flex-start; }
.msg.user  { align-self:flex-end; flex-direction:row-reverse; }

.msg-avatar {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  background:radial-gradient(circle at 35% 35%,#fff 0%,#b8e8e8 30%,#5bbfbf 65%,#2a8080 100%);
  box-shadow:0 0 12px rgba(91,191,191,0.3);
  display:flex; align-items:center; justify-content:center; font-size:16px;
}
.msg.user .msg-avatar { background:var(--navy); }

.msg-body { display:flex; flex-direction:column; gap:6px; }

.bubble {
  padding:13px 17px; border-radius:18px; font-size:15px; line-height:1.6;
}
.msg.arelo .bubble {
  background:var(--surface-up); border:1px solid var(--line);
  border-bottom-left-radius:4px;
}
.msg.user .bubble {
  background:var(--teal); color:var(--navy-dark);
  border-bottom-right-radius:4px; font-weight:600;
}

/* context note under Arelo's bubble */
.context-note {
  font-size:12px; color:var(--muted); padding:0 4px;
  display:flex; align-items:center; gap:5px;
  animation: fadeIn .4s .2s both;
}
.context-note svg { opacity:.5; flex-shrink:0; }
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* typing indicator */
.typing-dots { display:flex; gap:4px; padding:14px 18px; }
.typing-dots span {
  width:7px; height:7px; border-radius:50%; background:var(--teal);
  animation:typingBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* ── OPTION CHIPS ── */
.chip-row {
  display:flex; flex-wrap:wrap; gap:8px;
  padding:4px 0;
  animation:msgIn .35s .1s both;
}
.chip {
  background:var(--surface); border:1px solid rgba(91,191,191,0.3);
  color:rgba(255,255,255,0.85); padding:8px 16px;
  border-radius:40px; font-size:14px; cursor:pointer;
  transition:background .15s, border-color .15s, color .15s, transform .1s;
  font-family:'Atkinson Hyperlegible',sans-serif;
}
.chip:hover { background:rgba(91,191,191,0.18); border-color:var(--teal); color:#fff; transform:translateY(-1px); }
.chip:active { transform:translateY(0); }
.chip.selected { background:rgba(91,191,191,0.18); border-color:var(--teal); color:#fff; }

/* ── INPUT AREA ── */
.input-area {
  flex-shrink:0; padding:12px 0 20px;
  border-top:1px solid var(--line);
  display:flex; gap:10px; align-items:flex-end;
}
.input-wrap {
  flex:1; position:relative;
  background:var(--surface); border:1px solid var(--line);
  border-radius:16px; transition:border-color .2s;
}
.input-wrap:focus-within { border-color:rgba(91,191,191,0.4); }
#chatInput {
  width:100%; background:transparent; border:none; outline:none;
  color:#fff; font:inherit; font-size:15px;
  padding:13px 50px 13px 16px;
  resize:none; min-height:48px; max-height:120px;
  line-height:1.5;
}
#chatInput::placeholder { color:var(--muted); }
.send-btn {
  position:absolute; right:10px; bottom:8px;
  width:34px; height:34px; border-radius:10px;
  background:var(--teal); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, transform .1s, opacity .15s;
  opacity:.5;
}
.send-btn.ready { opacity:1; }
.send-btn:hover { background:#6ecece; transform:scale(1.05); }
.send-btn svg { pointer-events:none; }

/* skip/continue button */
.action-row {
  display:flex; justify-content:flex-end; gap:10px; align-items:center;
  padding-bottom:4px;
}
.skip-btn {
  background:transparent; border:none; color:var(--muted);
  font:inherit; font-size:13px; cursor:pointer; padding:4px;
  text-decoration:underline; text-underline-offset:3px;
  transition:color .2s;
}
.skip-btn:hover { color:rgba(255,255,255,0.8); }
.continue-btn {
  background:var(--teal); border:none; color:var(--navy-dark);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:15px;
  padding:11px 24px; border-radius:40px; cursor:pointer;
  box-shadow:0 0 24px var(--teal-glow);
  transition:transform .15s, box-shadow .15s; display:none;
}
.continue-btn:hover { transform:translateY(-1px); box-shadow:0 0 32px rgba(91,191,191,0.5); }

/* ── COMPLETE SCREEN ── */
#completeScreen {
  display:none; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; flex:1; gap:0; padding:40px 0;
  animation:fadeUp .7s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.complete-orb {
  width:80px; height:80px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff 0%,#b8e8e8 30%,#5bbfbf 65%,#2a8080 100%);
  box-shadow:0 0 48px rgba(91,191,191,0.5);
  margin-bottom:28px; animation:orbPulse 3s ease-in-out infinite;
}
@keyframes orbPulse{0%,100%{box-shadow:0 0 48px rgba(91,191,191,0.5)}50%{box-shadow:0 0 72px rgba(91,191,191,0.7)}}
.complete-title {
  font-family:'DM Serif Display',serif;
  font-size:clamp(32px,6vw,52px); line-height:1.1; margin-bottom:16px;
}
.complete-title em { font-style:italic; color:var(--teal); }
.complete-sub { color:var(--muted); font-size:17px; line-height:1.6; max-width:420px; margin-bottom:36px; }
.complete-btn {
  background:var(--teal); border:none; color:var(--navy-dark);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:17px;
  padding:15px 36px; border-radius:50px; cursor:pointer;
  box-shadow:0 0 40px rgba(91,191,191,0.4);
  transition:transform .15s, box-shadow .15s; text-decoration:none;
  display:inline-block;
}
.complete-btn:hover { transform:translateY(-2px); box-shadow:0 0 56px rgba(91,191,191,0.55); }
</style>
</head>
<body>
<div class="bg"></div>

<div class="page">

  <!-- TOP BAR -->
  <div class="top-bar">
    <a class="logo" href="arelo_home.html">
      <div class="logo-orb"></div>
      <span class="logo-text">Arelo</span>
    </a>
    <div class="progress-wrap">
      <div class="progress-steps" id="progressSteps"></div>
      <span class="progress-label" id="progressLabel">Getting started</span>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea"></div>

  <!-- COMPLETE SCREEN (hidden until end) -->
  <div id="completeScreen">
    <div class="complete-orb"></div>
    <h1 class="complete-title">You're all set,<br><em>let's get calm.</em></h1>
    <p class="complete-sub">Arelo is scanning your inbox now and getting your task areas ready. Your personal dashboard will be ready in just a moment.</p>
    <a class="complete-btn" href="arelo_dashboard.html">Open my dashboard →</a>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area" id="inputArea">
    <div class="input-wrap">
      <textarea id="chatInput" placeholder="Type a reply…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendUserMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
// ── DATA COLLECTED ──────────────────────────────────────
const profile = {};
const SUPABASE_URL = 'https://cfnuvhvncoumakrogrdb.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_AJwEwPfNe_bst7J3scwmzg_iv3TiUbA';

let supabaseClient = null;

function getSupabaseClient() {
  if (!supabaseClient && window.supabase) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
  return supabaseClient;
}

async function signInWithGoogle() {
  const client = getSupabaseClient();

  if (!client) {
    alert('Google sign in is still loading. Please try again in a moment.');
    return;
  }

  // Save onboarding answers before leaving for Google.
  localStorage.setItem('arelo_onboarding_profile', JSON.stringify(profile));
  sessionStorage.setItem('arelo_connecting_gmail', 'true');

  const { error } = await client.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://myarelo.ai/arelo_dashboard.html'
    }
  });

  if (error) {
    console.error('Google sign in failed:', error);
    alert('Google sign in failed. Please try again.');
  }
}


// ── STEP DEFINITIONS ────────────────────────────────────
// Each step: { id, progressLabel, contextNote, chips?, freeText? }
// Arelo intro message is generated by the AI in step 0
// Subsequent messages are driven by the AI using context
const TOTAL_STEPS = 6;

const steps = [
  {
    id: 0,
    progressLabel: 'Welcome',
    systemNote: null,
    contextNote: null,
  },
  {
    id: 1,
    progressLabel: 'Your name',
    contextNote: 'Used to personalise your dashboard and how Arelo talks to you.',
    chips: null,
  },
  {
    id: 2,
    progressLabel: 'What\'s hard',
    contextNote: 'Helps Arelo understand what to focus on — email tasks, life admin, work, or everything at once.',
    chips: ['My inbox is out of control', 'I forget things I\'ve promised', 'I have too much on across work & home', 'I have ADHD or get overwhelmed', 'All of the above'],
  },
  {
    id: 3,
    progressLabel: 'Life areas',
    contextNote: 'Arelo uses these to sort your tasks into areas — so you see what\'s relevant without seeing everything at once.',
    chips: ['Work', 'Family / home', 'Personal admin', 'All three', 'Something else'],
  },
  {
    id: 4,
    progressLabel: 'Arelo\'s style',
    contextNote: 'This shapes how your AI companion speaks to you every day — in the dashboard and when you ask for help.',
    chips: ['Warm and encouraging', 'Direct and clear', 'Calm and neutral', 'Gently humorous'],
  },
  {
    id: 5,
    progressLabel: 'Your inbox',
    contextNote: 'Arelo scans your last 3 weeks to find tasks hiding in your emails. You can also add tasks manually anytime.',
    chips: ['Connect Gmail', 'Connect Outlook', 'I\'ll do this later'],
  },
];

let currentStep = -1;
let waitingForUser = false;
let conversationHistory = [];

// ── PROGRESS DOTS ────────────────────────────────────────
function renderProgress(step) {
  const container = document.getElementById('progressSteps');
  container.innerHTML = '';
  for (let i = 0; i < TOTAL_STEPS; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot' + (i < step ? ' done' : '') + (i === step ? ' active' : '');
    container.appendChild(d);
  }
  const stepDef = steps[Math.min(step, steps.length - 1)];
  document.getElementById('progressLabel').textContent = stepDef?.progressLabel || '';
}

// ── RENDER A MESSAGE ─────────────────────────────────────
function addMessage(role, text, chips, contextNote) {
  const chat = document.getElementById('chatArea');

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  if (role === 'arelo') {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    msg.appendChild(av);
  } else {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '👤';
    msg.appendChild(av);
  }

  const body = document.createElement('div');
  body.className = 'msg-body';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  body.appendChild(bubble);

  if (contextNote && role === 'arelo') {
    const note = document.createElement('div');
    note.className = 'context-note';
    note.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>${contextNote}`;
    body.appendChild(note);
  }

  msg.appendChild(body);
  chat.appendChild(msg);

  if (chips && chips.length) {
    const row = document.createElement('div');
    row.className = 'chip-row';
    row.id = 'chipRow';
    chips.forEach(c => {
      const ch = document.createElement('button');
      ch.className = 'chip';
      ch.textContent = c;
      ch.onclick = () => selectChip(c, row);
      row.appendChild(ch);
    });
    chat.appendChild(row);
  }

  scrollBottom();
  return bubble;
}

function scrollBottom() {
  const chat = document.getElementById('chatArea');
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

// ── TYPING INDICATOR ─────────────────────────────────────
function showTyping() {
  const chat = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'msg arelo'; msg.id = 'typing';
  const av = document.createElement('div'); av.className = 'msg-avatar'; msg.appendChild(av);
  const body = document.createElement('div'); body.className = 'msg-body';
  const b = document.createElement('div'); b.className = 'bubble';
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  body.appendChild(b); msg.appendChild(body); chat.appendChild(msg);
  scrollBottom();
}
function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

// ── CHIP SELECT ───────────────────────────────────────────
function selectChip(value, row) {
  if (!waitingForUser) return;
  row.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  row.querySelectorAll('.chip').forEach(c => { if (c.textContent === value) c.classList.add('selected'); });
  setTimeout(() => { processUserReply(value); }, 200);
}

// ── SEND MESSAGE ──────────────────────────────────────────
function sendUserMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !waitingForUser) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').classList.remove('ready');
  // remove chip row if present
  const cr = document.getElementById('chipRow');
  if (cr) cr.remove();
  processUserReply(text);
}

// ── PROCESS USER REPLY ────────────────────────────────────
async function processUserReply(text) {
  waitingForUser = false;
  setInputEnabled(false);
 // Handle inbox connection at step 5
  if (currentStep === 5 && text === 'Connect Gmail') {
    addMessage('user', text);

    switch (currentStep) {
      case 5: profile.inbox = text; break;
    }

    await finaliseOnboarding();
    await signInWithGoogle();
    return;
  }
  if (currentStep === 5 && text === 'Connect Outlook') {
    window.location.href = './arelo_login.html?reconnect=outlook';
    return;
  }
  addMessage('user', text);

  // store in profile
  switch (currentStep) {
    case 1: profile.name = text; break;
    case 2: profile.situation = text; break;
    case 3: profile.lifeAreas = text; break;
    case 4: profile.tone = text; break;
    case 5: profile.inbox = text; break;
  }

  conversationHistory.push({ role: 'user', content: text });
  currentStep++;
  renderProgress(currentStep);

  if (currentStep >= TOTAL_STEPS) {
    await finaliseOnboarding();
    return;
  }

  await callArelo();
}

// ── CALL ARELO AI ─────────────────────────────────────────
async function callArelo() {
  showTyping();

  const stepDef = steps[currentStep];

  // Build system prompt
  const systemPrompt = `You are Arelo, a warm, calm AI companion helping a new user set up their account. You are designed specifically for people who feel overwhelmed by email — including people with ADHD or anxiety. Your tone should be gently warm, never clinical, never overwhelming. Keep messages short (2-4 sentences max). You're having a natural conversation, not filling in a form.

Current onboarding step: ${currentStep} of ${TOTAL_STEPS - 1}
Step name: ${stepDef.progressLabel}

Profile collected so far: ${JSON.stringify(profile)}

Your job for this step: ${getStepInstruction(currentStep)}

Important rules:
- If the user shared their name in step 1, use it now and then sparingly.
- Never list multiple questions. Ask one thing naturally.
- If chips/options will be shown, you don't need to list them — just ask the question and say something like "you can type or pick below."
- Be warm, not performative. No "Great!" or "Awesome!" — just genuine warmth.
- Don't mention databases, profiles, fields, or technical things.
- If this is the final step before completion (step 5), acknowledge we're almost done.`;

try {
        const resp = await fetch('https://hook.eu1.make.com/u0tcso1eeai50e6kq7j4aufenl5nnlye', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
    system: systemPrompt + '\n\nConversation so far:\n' + conversationHistory.map(m => m.role + ': ' + m.content).join('\n'),
    message: 'continue',
  })
    });
    const data = await resp.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || "What's your name?";

    conversationHistory.push({ role: 'assistant', content: reply });

    hideTyping();
    addMessage('arelo', reply, stepDef.chips, stepDef.contextNote);
    waitingForUser = true;
    setInputEnabled(true);

  } catch (e) {
    hideTyping();
    const fallback = getFallback(currentStep);
    addMessage('arelo', fallback, stepDef.chips, stepDef.contextNote);
    conversationHistory.push({ role: 'assistant', content: fallback });
    waitingForUser = true;
    setInputEnabled(true);
  }
}

function getStepInstruction(step) {
  switch(step) {
    case 1: return "Ask the user their name warmly. This is the very first personal question after the intro.";
    case 2: return "Ask what's been hard for them — what's making things feel overwhelming or slipping through. Make it clear Arelo handles more than just email: tasks from your inbox, things you add yourself, work projects, home admin, things you're waiting on. Be empathetic and make them feel seen.";
    case 3: return "Ask which areas of life Arelo should focus on — work, home/family, personal admin, or a mix. Explain briefly that Arelo will sort tasks into these areas so they never see everything at once, just what's relevant. Keep it light.";
    case 4: return "Ask how they'd like Arelo to talk to them day-to-day — their communication style preference for the companion.";
    case 5: return "Invite them to connect their inbox so Arelo can start finding tasks hiding in emails. Be clear that email is *one* source — they can also add tasks manually or just speak/type things into Arelo anytime. The inbox scan covers about 3 weeks and email content is never stored permanently. Make it feel safe and optional.";
    default: return "Continue the onboarding naturally.";
  }
}

function getFallback(step) {
  const fallbacks = [
    "Hi! I'm Arelo — your task and inbox companion. I'll ask you a few quick questions so I can set things up just right for you. It won't take long. What's your name?",
    "What's your name? I'd love to know who I'm helping.",
    "What's been feeling hard lately — is it the inbox, things you keep forgetting, too much going on across work and home, or just all of it? You can pick one below or tell me in your own words.",
    "Which areas of your life do you want Arelo to help with? I'll use this to sort your tasks — so you only see what's relevant, not everything at once.",
    "How would you like me to talk to you? I can be warm and encouraging, direct and brief, or somewhere in between.",
    "Last thing — if you'd like to connect your inbox now, I can start finding tasks hiding in your emails. You can also add tasks manually anytime, or just tell me things as they come up. Email content is never stored — I just extract the actions. No pressure to do this now if you'd rather get started first."
  ];
  return fallbacks[step] || "Tell me more…";
}

// ── FINALISE ──────────────────────────────────────────────
async function finaliseOnboarding() {
  showTyping();

  // Save profile — send to onboarding webhook
  const account = getUserAccount();
  try {
    await fetch('https://hook.eu1.make.com/v1tzj7w92zfivbg5f9dy5nzfcl7uugel', {
         method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...profile, account, email: localStorage.getItem('arelo_email'), name: localStorage.getItem('arelo_name'), status: 'onboarding_complete', access_token: localStorage.getItem('arelo_access_token') })
    });
  } catch(e) { /* silent fail — will save on next login */ }
  // Trigger onboarding inbox scan  ← ADD HERE
  try {
    await fetch('https://hook.eu1.make.com/nbctb3hsxdcl51yizbn83yjz62n21kif', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        account,
        email: localStorage.getItem('arelo_email'),
        access_token: localStorage.getItem('arelo_access_token')
      })
    });
  } catch(e) { /* silent fail */ }

  await delay(1800);
  hideTyping();

  // Show completion
  document.getElementById('chatArea').style.display = 'none';
  document.getElementById('inputArea').style.display = 'none';

}

// ── OPEN ──────────────────────────────────────────────────
async function startOnboarding() {
  currentStep = 0;
  renderProgress(0);
  showTyping();

  const openingSystem = `You are Arelo, a calm, warm AI companion. A new user has just completed OAuth sign-in and is starting onboarding. Give a brief, warm welcome message (3-5 sentences). Introduce yourself simply. Tell them you'll ask just a few quick questions to set things up right for them — it takes about 2 minutes. Mention that Arelo is built for people who feel overwhelmed — by email, by tasks, by too much going on at once — so they're in exactly the right place. Don't ask a question yet — just welcome them. Keep it genuinely warm, not salesy or performative.`;

  try {
  const resp = await fetch('https://hook.eu1.make.com/u0tcso1eeai50e6kq7j4aufenl5nnlye', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
    system: openingSystem,
    message: 'start',
  })
  });
    const data = await resp.json();
    const welcome = data.content?.find(b => b.type === 'text')?.text || getFallback(0);
    conversationHistory.push({ role: 'assistant', content: welcome });
    hideTyping();
    addMessage('arelo', welcome, null, null);
  } catch(e) {
    hideTyping();
    const welcome = "Hello — I'm Arelo, your inbox companion. I'm really glad you're here.\n\nI know your inbox can feel like a lot. That's exactly what I'm here to help with. I'll ask you just a few quick questions — it'll take about two minutes — so I can set everything up in a way that actually works for you.\n\nLet's get started.";
    conversationHistory.push({ role: 'assistant', content: welcome });
    addMessage('arelo', welcome, null, null);
  }

  await delay(600);
  currentStep = 1;
  renderProgress(1);
  await callArelo();
}

// ── HELPERS ───────────────────────────────────────────────
function setInputEnabled(enabled) {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  input.disabled = !enabled;
  if (enabled) { input.focus(); } 
}

function getUserAccount() {
  // In production, get from auth session/localStorage
    return localStorage.getItem('arelo_account') || localStorage.getItem('arelo_email') || 'new_user';

}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// Auto-resize textarea
const chatInput = document.getElementById('chatInput');
chatInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  document.getElementById('sendBtn').classList.toggle('ready', this.value.trim().length > 0);
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUserMessage(); }
});

// Start
window.addEventListener('load', () => { startOnboarding(); });
</script>
