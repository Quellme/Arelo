<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwell Me — Let's get you set up</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#3d5a7a;
  --navy-dark:#2c4260;
  --navy-mid:#4e6d8c;
  --navy-soft:#eef2f7;
  --navy-line:#d0dae6;
  --teal:#5bbfbf;
  --teal-soft:#e6f5f5;
  --teal-dark:#3a9090;
  --page:#f0f3f7;
  --surface:#ffffff;
  --ink:#1e2e3e;
  --muted:#5a7089;
  --line:#d0dae6;
  --urgent:#b83232;
  --shadow-sm:0 3px 10px rgba(30,46,62,.08);
  --shadow-md:0 8px 28px rgba(30,46,62,.12);
  --shadow-xl:0 24px 64px rgba(20,35,55,.18);
  --r-lg:22px; --r-md:14px; --r-sm:10px;
}

/* ── THEMES ── */
body.theme-calm {
  --page:#f0f3f7; --surface:#ffffff; --ink:#1e2e3e; --teal:#5bbfbf;
  --navy-dark:#2c4260; --accent:#5bbfbf;
}
body.theme-focus {
  --page:#0f1923; --surface:#1a2a3a; --ink:#e8f0f8; --teal:#00d4d4;
  --navy-dark:#0a1218; --accent:#00d4d4; --muted:#6a8aaa; --line:#2a3a4a;
  --navy-soft:#1a2a3a; --navy-line:#2a3a4a;
}
body.theme-bright {
  --page:#fff8f0; --surface:#ffffff; --ink:#2d1a00; --teal:#ff6b35;
  --navy-dark:#2d1a00; --accent:#ff6b35; --muted:#8a6040; --line:#f0d8c0;
  --navy-soft:#fff0e0; --navy-line:#f0d8c0; --teal-soft:#fff0ea; --teal-dark:#cc5520;
}
body.theme-dark {
  --page:#111827; --surface:#1f2937; --ink:#f3f4f6; --teal:#34d399;
  --navy-dark:#0d1117; --accent:#34d399; --muted:#6b7280; --line:#374151;
  --navy-soft:#1f2937; --navy-line:#374151; --teal-soft:#064e3b; --teal-dark:#059669;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Atkinson Hyperlegible',sans-serif;background:var(--page);color:var(--ink);min-height:100vh;transition:background .4s,color .4s}

/* ── TOPBAR ── */
.topbar{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:var(--navy-dark)}
.logo{height:36px}
.topbar-step{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.06em}

/* ── PROGRESS BAR ── */
.progress-wrap{height:3px;background:var(--line);position:relative}
.progress-bar{height:3px;background:var(--teal);transition:width .5s cubic-bezier(.22,1,.36,1);width:0%}

/* ── MAIN LAYOUT ── */
.onboard-wrap{max-width:560px;margin:0 auto;padding:48px 24px 80px}

/* ── STEP CARD ── */
.step-card{background:var(--surface);border-radius:var(--r-lg);padding:36px;box-shadow:var(--shadow-md);border:1px solid var(--line);animation:fadeUp .35s cubic-bezier(.22,1,.36,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.step-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--teal);margin-bottom:12px}
.step-card h2{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;line-height:1.2;color:var(--ink);margin-bottom:10px}
.step-card p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:28px}
.step-card p.small{font-size:13px;margin-top:-18px;margin-bottom:24px}

/* ── FORM FIELDS ── */
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--navy-mid);margin-bottom:7px;text-transform:uppercase;letter-spacing:.08em}
.field input,.field select{width:100%;padding:13px 16px;border-radius:var(--r-sm);border:1.5px solid var(--line);background:var(--page);color:var(--ink);font-family:inherit;font-size:15px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--teal)}
.field .hint{font-size:12px;color:var(--muted);margin-top:6px}

/* ── CHOICE GRID ── */
.choice-grid{display:grid;gap:12px;margin-bottom:28px}
.choice-grid.cols-2{grid-template-columns:1fr 1fr}
.choice-grid.cols-3{grid-template-columns:1fr 1fr 1fr}

.choice-btn{padding:18px 16px;border-radius:var(--r-md);border:2px solid var(--line);background:var(--page);color:var(--ink);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-align:left;position:relative}
.choice-btn:hover{border-color:var(--teal);background:var(--teal-soft)}
.choice-btn.selected{border-color:var(--teal);background:var(--teal-soft);box-shadow:0 0 0 3px rgba(91,191,191,.15)}
.choice-btn .choice-icon{font-size:22px;margin-bottom:8px;display:block}
.choice-btn .choice-label{font-size:14px;font-weight:700;color:var(--ink);display:block}
.choice-btn .choice-desc{font-size:12px;color:var(--muted);margin-top:4px;display:block;font-weight:400;line-height:1.5}
.choice-btn.selected .choice-label{color:var(--teal-dark)}

/* ── THEME PREVIEWS ── */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.theme-option{border-radius:var(--r-md);border:2px solid var(--line);overflow:hidden;cursor:pointer;transition:all .2s}
.theme-option:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.theme-option.selected{border-color:var(--teal);box-shadow:0 0 0 3px rgba(91,191,191,.2)}
.theme-preview{height:90px;position:relative;overflow:hidden}
.theme-preview-calm{background:linear-gradient(135deg,#2c4260 0%,#3d5a7a 40%,#f0f3f7 40%)}
.theme-preview-focus{background:linear-gradient(135deg,#0f1923 0%,#1a2a3a 50%,#00d4d4 100%)}
.theme-preview-bright{background:linear-gradient(135deg,#2d1a00 0%,#ff6b35 60%,#fff8f0 60%)}
.theme-preview-dark{background:linear-gradient(135deg,#111827 0%,#1f2937 50%,#34d399 100%)}
.theme-preview-dot{width:28px;height:28px;border-radius:50%;position:absolute;bottom:14px;right:14px}
.theme-option-label{padding:10px 14px;background:var(--surface);display:flex;align-items:center;justify-content:space-between}
.theme-option-label strong{font-size:13px;font-weight:700;color:var(--ink)}
.theme-option-label span{font-size:11px;color:var(--muted)}
.theme-option.selected .theme-option-label strong{color:var(--teal-dark)}

/* ── TOGGLE SWITCH ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:16px;border-radius:var(--r-sm);border:1.5px solid var(--line);background:var(--page);margin-bottom:12px}
.toggle-row-left strong{font-size:14px;font-weight:700;color:var(--ink);display:block}
.toggle-row-left span{font-size:12px;color:var(--muted)}
.toggle{width:44px;height:24px;background:var(--line);border-radius:999px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--teal)}
.toggle::after{content:'';width:18px;height:18px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle.on::after{left:23px}

/* ── CONTACT FIELDS (conditional) ── */
.contact-field{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .3s ease,margin .3s ease;margin-bottom:0}
.contact-field.visible{max-height:120px;opacity:1;margin-bottom:16px}

/* ── TIME PICKER ── */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.time-option{padding:14px 16px;border-radius:var(--r-sm);border:2px solid var(--line);background:var(--page);cursor:pointer;transition:all .2s;text-align:center;font-weight:700;font-size:14px;color:var(--ink)}
.time-option:hover{border-color:var(--teal)}
.time-option.selected{border-color:var(--teal);background:var(--teal-soft);color:var(--teal-dark)}
.time-option span{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:3px}

/* ── TONE OPTIONS ── */
.tone-note{font-size:12px;color:var(--muted);margin-top:-20px;margin-bottom:24px;padding:10px 14px;background:var(--navy-soft);border-radius:var(--r-sm);border:1px solid var(--navy-line)}

/* ── SCAN SCREEN ── */
.scan-wrap{text-align:center;padding:40px 0 20px}
.scan-icon{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);margin:0 auto 24px;display:flex;align-items:center;justify-content:center;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(91,191,191,.4)}50%{transform:scale(1.05);box-shadow:0 0 0 14px rgba(91,191,191,0)}}
.scan-icon svg{width:36px;height:36px;fill:white}
.scan-wrap h2{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;color:var(--ink);margin-bottom:10px}
.scan-wrap p{font-size:14px;color:var(--muted);line-height:1.7;max-width:36ch;margin:0 auto 32px}

.scan-steps{text-align:left;background:var(--page);border-radius:var(--r-md);border:1px solid var(--line);overflow:hidden;margin-bottom:8px}
.scan-step{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line)}
.scan-step:last-child{border-bottom:none}
.scan-step-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .4s}
.scan-step-icon.waiting{background:var(--navy-soft);border:1.5px solid var(--navy-line)}
.scan-step-icon.active{background:var(--teal-soft);border:1.5px solid var(--teal);animation:spin 1.2s linear infinite}
.scan-step-icon.done{background:#d1fae5;border:1.5px solid #6ee7b7;color:#059669}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.scan-step-text strong{font-size:13px;font-weight:700;display:block}
.scan-step-text span{font-size:11px;color:var(--muted)}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:15px 24px;border-radius:999px;background:var(--teal);border:none;color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-primary:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-secondary{width:100%;padding:13px 24px;border-radius:999px;background:transparent;border:1.5px solid var(--line);color:var(--muted);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-secondary:hover{background:var(--page)}

/* ── REASSURE TEXT ── */
.reassure{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}
.reassure a{color:var(--teal-dark);text-decoration:none}

/* ── SCAN QUESTIONS (shown while scanning) ── */
.scan-question-panel{margin-top:32px;animation:fadeUp .35s ease}
.sq-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--teal);margin-bottom:14px}

/* ── DONE SCREEN ── */
.done-wrap{text-align:center;padding:32px 0}
.done-icon{font-size:52px;margin-bottom:20px;animation:bounceIn .5s cubic-bezier(.22,1,.36,1)}
@keyframes bounceIn{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.done-wrap h2{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:var(--ink);margin-bottom:10px}
.done-wrap p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:32px}

/* ── MOBILE ── */
@media(max-width:600px){
  .topbar{padding:0 20px}
  .onboard-wrap{padding:28px 16px 80px}
  .step-card{padding:24px 20px}
  .choice-grid.cols-3{grid-template-columns:1fr}
  .theme-grid{grid-template-columns:1fr}
  .time-grid{grid-template-columns:1fr}
}
</style>
</head>

<script>
// ─── WEBHOOK URLS ────────────────────────────────────────────────────────────
const WEBHOOK_ONBOARDING = 'https://hook.eu1.make.com/rvqvyby3rd3e3a9hxcj0nm4yyvuodmhx';
const WEBHOOK_INBOX_SCAN  = 'https://hook.eu1.make.com/nbctb3hsxdcl51yizbn83yjz62n21kif';
const WEBHOOK_COMPLETE    = 'https://hook.eu1.make.com/v1tzj7w92zfivbg5f9dy5nzfcl7uugel';

// ─── STATE ───────────────────────────────────────────────────────────────────
let userData = {
  name: '',
  email: '',
  age_group: '',
  theme: 'calm',
  tone: '',
  update_time: '',
  telegram: '',
  whatsapp: '',
  urgent_whatsapp: false,
  urgent_telegram: false,
  urgent_keywords: ''
};

let currentStep = 0;
const TOTAL_STEPS = 7;
let scanComplete = false;

// ─── THEME APPLICATION ───────────────────────────────────────────────────────
function applyTheme(theme) {
  document.body.className = `theme-${theme}`;
  userData.theme = theme;
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function updateProgress(step) {
  const pct = ((step + 1) / TOTAL_STEPS) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('stepLabel').textContent = `Step ${step + 1} of ${TOTAL_STEPS}`;
}

// ─── RENDER STEPS ────────────────────────────────────────────────────────────
function render(step) {
  currentStep = step;
  updateProgress(step);
  const container = document.getElementById('stepContainer');
  const steps = [step0, step1, step2, step3, step4, step5, step6];
  container.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'step-card';
  card.innerHTML = steps[step]();
  container.appendChild(card);
  wireStep(step);
}

// ─── STEP 0: Name & Email ─────────────────────────────────────────────────────
function step0() {
  return `
    <div class="step-eyebrow">Welcome to Qwell Me</div>
    <h2>Let's start with the basics.</h2>
    <p>Just your name and email — that's all we need to get started. Everything else we'll figure out together.</p>
    <div class="field">
      <label>Your name</label>
      <input type="text" id="inputName" placeholder="e.g. Emma" value="${userData.name}" autocomplete="given-name">
    </div>
    <div class="field">
      <label>Your email address</label>
      <input type="email" id="inputEmail" placeholder="you@example.com" value="${userData.email}" autocomplete="email">
      <div class="hint">This is the inbox Qwell Me will help you manage.</div>
    </div>
    <button class="btn-primary" id="btnNext0">Continue →</button>
    <p class="reassure">🔒 Your data is only used to run Qwell Me. We never sell or share it.</p>
  `;
}

// ─── STEP 1: Age Group ───────────────────────────────────────────────────────
function step1() {
  return `
    <div class="step-eyebrow">About you</div>
    <h2>Who is Qwell Me for?</h2>
    <p>This helps us use the right language and keep things feeling right for you.</p>
    <div class="choice-grid cols-3">
      <button class="choice-btn ${userData.age_group==='child'?'selected':''}" data-age="child">
        <span class="choice-icon">🌱</span>
        <span class="choice-label">Child</span>
        <span class="choice-desc">Simple, clear, encouraging</span>
      </button>
      <button class="choice-btn ${userData.age_group==='young_adult'?'selected':''}" data-age="young_adult">
        <span class="choice-icon">⚡</span>
        <span class="choice-label">Young Adult</span>
        <span class="choice-desc">Straight-talking, energetic</span>
      </button>
      <button class="choice-btn ${userData.age_group==='adult'?'selected':''}" data-age="adult">
        <span class="choice-icon">🌿</span>
        <span class="choice-label">Adult</span>
        <span class="choice-desc">Calm, warm, thoughtful</span>
      </button>
    </div>
    <button class="btn-primary" id="btnNext1" ${!userData.age_group?'disabled':''}>Continue →</button>
    <button class="btn-secondary" id="btnBack1">← Back</button>
  `;
}

// ─── STEP 2: Theme ───────────────────────────────────────────────────────────
function step2() {
  return `
    <div class="step-eyebrow">Make it yours</div>
    <h2>Pick a look that feels right.</h2>
    <p>These are designed with focus and calm in mind. You can change this any time in your settings.</p>
    <div class="theme-grid">
      <div class="theme-option ${userData.theme==='calm'?'selected':''}" data-theme="calm">
        <div class="theme-preview theme-preview-calm">
          <div class="theme-preview-dot" style="background:#5bbfbf"></div>
        </div>
        <div class="theme-option-label">
          <strong>Calm</strong>
          <span>Soft & quiet</span>
        </div>

// ─── WIRE STEPS ──────────────────────────────────────────────────────────────
function wireStep(step) {
  if (step === 0) {
    document.getElementById('btnNext0').addEventListener('click', () => {
      const name = document.getElementById('inputName').value.trim();
      const email = document.getElementById('inputEmail').value.trim();
      if (!name || !email || !email.includes('@')) {
        alert('Please enter your name and a valid email address.');
        return;
      }
      userData.name = name;
      userData.email = email;
      // Send initial data to Make
      sendToMake(WEBHOOK_ONBOARDING, { name, email, status: 'started', timestamp: new Date().toISOString() });
      render(1);
    });
  }

  if (step === 1) {
    document.querySelectorAll('[data-age]').forEach(btn => {
      btn.addEventListener('click', () => {
        userData.age_group = btn.dataset.age;
        document.querySelectorAll('[data-age]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('btnNext1').disabled = false;
      });
    });
    document.getElementById('btnNext1').addEventListener('click', () => render(2));
    document.getElementById('btnBack1').addEventListener('click', () => render(0));
  }

  if (step === 2) {
    document.querySelectorAll('[data-theme]').forEach(opt => {
      opt.addEventListener('click', () => {
        userData.theme = opt.dataset.theme;
        applyTheme(opt.dataset.theme);
        document.querySelectorAll('[data-theme]').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      });
    });
    document.getElementById('btnNext2').addEventListener('click', () => render(3));
    document.getElementById('btnBack2').addEventListener('click', () => render(1));
  }

  if (step === 3) {
    // Telegram toggle
    document.getElementById('toggleTelegram').addEventListener('click', function() {
      userData.urgent_telegram = !userData.urgent_telegram;
      this.classList.toggle('on', userData.urgent_telegram);
      document.getElementById('telegramField').classList.toggle('visible', userData.urgent_telegram);
    });
    // WhatsApp toggle
    document.getElementById('toggleWhatsapp').addEventListener('click', function() {
      userData.urgent_whatsapp = !userData.urgent_whatsapp;
      this.classList.toggle('on', userData.urgent_whatsapp);
      document.getElementById('whatsappField').classList.toggle('visible', userData.urgent_whatsapp);
    });
    document.getElementById('inputTelegram').addEventListener('input', e => userData.telegram = e.target.value);
    document.getElementById('inputWhatsapp').addEventListener('input', e => userData.whatsapp = e.target.value);
    document.getElementById('btnNext3').addEventListener('click', () => render(4));
    document.getElementById('btnBack3').addEventListener('click', () => render(2));
  }

  if (step === 4) {
    document.getElementById('inputUrgentKeywords').addEventListener('input', e => {
      userData.urgent_keywords = e.target.value;
    });
    document.getElementById('btnNext4').addEventListener('click', () => render(5));
    document.getElementById('btnBack4').addEventListener('click', () => render(3));
  }

  if (step === 5) {
    document.querySelectorAll('[data-time]').forEach(opt => {
      opt.addEventListener('click', () => {
        userData.update_time = opt.dataset.time;
        document.querySelectorAll('[data-time]').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        document.getElementById('btnNext5').disabled = false;
      });
    });
    document.getElementById('btnNext5').addEventListener('click', () => {
      render(6);
      const profile = {
        name: userData.name,
        email: userData.email,
        theme: userData.theme,
        tone: userData.tone,
        age_group: userData.age_group,
        update_time: userData.update_time,
        telegram: userData.telegram,
        whatsapp: userData.whatsapp,
        urgent_keywords: userData.urgent_keywords
      };
      localStorage.setItem('qwellme_user', JSON.stringify(profile));
      sendToMake(WEBHOOK_ONBOARDING, {
        ...userData,
        status: 'preferences_saved',
        timestamp: new Date().toISOString()
      });
      startScan();
    });
    document.getElementById('btnBack5').addEventListener('click', () => render(4));
  }

  if (step === 6) {
    // Tone buttons wired after render
    document.querySelectorAll('[data-tone]').forEach(btn => {
      btn.addEventListener('click', () => {
        userData.tone = btn.dataset.tone;
        document.querySelectorAll('[data-tone]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        // Save tone preference
        sendToMake(WEBHOOK_ONBOARDING, { email: userData.email, tone: userData.tone });
      });
    });

    document.getElementById('btnDone').addEventListener('click', () => {
      // Fire onboarding complete webhook then go to dashboard
      sendToMake(WEBHOOK_COMPLETE, {
        email: userData.email,
        name: userData.name,
        status: 'onboarding_complete',
        timestamp: new Date().toISOString()
      });
      window.location.href = 'dashboard.html';
    });
  }
}

// ─── SCAN ANIMATION ──────────────────────────────────────────────────────────
function startScan() {
  // Fire the inbox scan webhook
  sendToMake(WEBHOOK_INBOX_SCAN, {
    email: userData.email,
    name: userData.name,
    timestamp: new Date().toISOString()
  });

  const icons = ['scanIcon0','scanIcon1','scanIcon2','scanIcon3'];
  const emojis = ['📧','📤','📅','🧠'];
  let i = 0;

  function nextIcon() {
    if (i > 0) {
      const prev = document.getElementById(icons[i-1]);
      if (prev) { prev.className = 'scan-step-icon done'; prev.textContent = '✓'; }
    }
    if (i < icons.length) {
      const curr = document.getElementById(icons[i]);
      if (curr) { curr.className = 'scan-step-icon active'; curr.textContent = '⟳'; }
      i++;
      setTimeout(nextIcon, 14000); // ~56s total across 4 steps
    } else {
      // All steps done
      scanComplete = true;
      const btnDone = document.getElementById('btnDone');
      if (btnDone) {
        btnDone.style.display = 'block';
        btnDone.textContent = 'Your dashboard is ready →';
        // Update scan heading
        const h2 = document.querySelector('.scan-wrap h2');
        if (h2) h2.textContent = 'Your inbox has been sorted ✓';
        const p = document.querySelector('.scan-wrap p');
        if (p) p.textContent = 'Qwell Me has read your emails and built your first priority list.';
      }
    }
  }
  setTimeout(nextIcon, 500);
}

// ─── SEND TO MAKE ────────────────────────────────────────────────────────────
function sendToMake(url, data) {
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).catch(err => console.warn('Webhook error:', err));
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
render(0);
</script>
