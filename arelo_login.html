 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arelo — Sign in</title>
<meta name="description" content="Arelo turns email overwhelm into calm. Sign in to your dashboard.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='og' cx='35%' cy='35%' r='65%'><stop offset='0%' stop-color='%23ffffff'/><stop offset='35%' stop-color='%23b8e8e8'/><stop offset='70%' stop-color='%235bbfbf'/><stop offset='100%' stop-color='%232a8080'/></radialGradient></defs><ellipse cx='16' cy='16' rx='14' ry='14' fill='url(%23og)'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:        #3d5a7a;
  --navy-dark:   #1e2e3e;
  --navy-mid:    #2c4260;
  --teal:        #5bbfbf;
  --teal-dark:   #3a9090;
  --teal-glow:   rgba(91,191,191,0.45);
  --teal-soft:   rgba(91,191,191,0.12);
  --surface:     #ffffff;
  --ink:         #1e2e3e;
  --muted:       rgba(255,255,255,0.5);
  --line:        rgba(255,255,255,0.1);
  --shadow-xl:   0 24px 64px rgba(10,20,35,0.45);
  --shadow-glow: 0 0 48px rgba(91,191,191,0.25);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Atkinson Hyperlegible', sans-serif;
  background: var(--navy-dark);
  color: #fff;
  overflow: hidden;
}

/* ── BACKGROUND ────────────────────────────────── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 60% 55% at 15% 85%, rgba(91,191,191,0.14) 0%, transparent 70%),
    radial-gradient(ellipse 45% 40% at 88% 10%, rgba(61,90,122,0.5) 0%, transparent 65%),
    linear-gradient(160deg, #101c2a 0%, #1e2e3e 45%, #0f1c2b 100%);
}

/* subtle animated mesh */
.bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px),
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px);
  animation: meshDrift 20s linear infinite;
}
@keyframes meshDrift {
  from { transform: translateY(0); }
  to   { transform: translateY(60px); }
}

/* ── LAYOUT ────────────────────────────────────── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ── CARD ──────────────────────────────────────── */
.card {
  background: rgba(255,255,255,0.045);
  backdrop-filter: blur(28px) saturate(140%);
  -webkit-backdrop-filter: blur(28px) saturate(140%);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 28px;
  width: min(420px, 100%);
  box-shadow: var(--shadow-xl), var(--shadow-glow);
  overflow: hidden;
  animation: cardRise 0.65s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardRise {
  from { opacity: 0; transform: translateY(28px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}

/* ── CARD HEADER ───────────────────────────────── */
.card-header {
  padding: 44px 32px 32px;
  text-align: center;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(91,191,191,0.06) 0%, transparent 100%);
}

/* ORB ANIMATION */
.orb {
  width: 68px;
  height: 68px;
  border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
  background: radial-gradient(circle at 30% 30%,
    #ffffff 0%, #b8e8e8 35%, #5bbfbf 70%, #2a8080 100%);
  box-shadow: 0 0 32px rgba(91,191,191,0.65), 0 0 80px rgba(91,191,191,0.2);
  margin: 0 auto 20px;
  animation: orbShape 7s ease-in-out infinite, orbFloat 4s ease-in-out infinite;
}
@keyframes orbShape {
  0%, 100% { border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%; }
  25%  { border-radius: 45% 55% 40% 60% / 60% 45% 55% 40%; }
  50%  { border-radius: 55% 45% 60% 40% / 40% 55% 45% 60%; }
  75%  { border-radius: 40% 60% 45% 55% / 55% 40% 60% 45%; }
}
@keyframes orbFloat {
  0%, 100% { transform: translateY(0); }
  50%  { transform: translateY(-6px); }
}

.brand-name {
  font-family: 'Nunito', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}
.brand-tagline {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* ── CARD BODY ─────────────────────────────────── */
.card-body {
  padding: 32px;
}

.sign-in-label {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  text-align: center;
  margin-bottom: 20px;
}

/* ── OAUTH BUTTONS ─────────────────────────────── */
.oauth-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.07);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
  text-align: left;
}
.oauth-btn:last-of-type { margin-bottom: 0; }

.oauth-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.18s;
}
.oauth-btn:hover { 
  border-color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.12);
  transform: translateY(-1px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.25);
}
.oauth-btn:hover::before { opacity: 1; }
.oauth-btn:active { transform: translateY(0); box-shadow: none; }

.oauth-btn:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none;
}

.btn-icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

.btn-text { flex: 1; }

.btn-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 7px;
  border-radius: 999px;
  background: rgba(91,191,191,0.2);
  color: var(--teal);
  border: 1px solid rgba(91,191,191,0.3);
  letter-spacing: 0.04em;
  white-space: nowrap;
}

/* Google specifics */
.oauth-btn.google:hover { 
  border-color: rgba(66,133,244,0.5);
  box-shadow: 0 8px 28px rgba(66,133,244,0.18), 0 0 0 1px rgba(66,133,244,0.12);
}
/* Azure specifics */
.oauth-btn.azure:hover  { 
  border-color: rgba(0,120,212,0.5);
  box-shadow: 0 8px 28px rgba(0,120,212,0.18), 0 0 0 1px rgba(0,120,212,0.12);
}

/* ── DIVIDER ───────────────────────────────────── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}
.divider span {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── FOOTER NOTE ───────────────────────────────── */
.footer-note {
  margin-top: 24px;
  font-size: 11.5px;
  color: rgba(255,255,255,0.3);
  text-align: center;
  line-height: 1.6;
}
.footer-note a {
  color: var(--teal);
  text-decoration: none;
}
.footer-note a:hover { text-decoration: underline; }

/* ── STATUS MESSAGE ────────────────────────────── */
.status-msg {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 16px;
  animation: fadeIn 0.2s ease;
}
.status-msg.visible { display: flex; }
.status-msg.error   { background: rgba(192,57,43,0.15); color: #e88; border: 1px solid rgba(192,57,43,0.3); }
.status-msg.info    { background: rgba(91,191,191,0.1); color: var(--teal); border: 1px solid rgba(91,191,191,0.25); }
.status-msg.loading { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); border: 1px solid var(--line); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

/* ── SPINNER ───────────────────────────────────── */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOP LOGO ──────────────────────────────────── */
.top-logo {
  position: fixed;
  top: 24px;
  left: 28px;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  opacity: 0;
  animation: fadeIn 0.6s 0.3s ease both;
}
.top-logo-orb {
  width: 30px; height: 30px;
  border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
  background: radial-gradient(circle at 30% 30%, #fff 0%, #b8e8e8 35%, #5bbfbf 70%, #2a8080 100%);
  box-shadow: 0 0 14px rgba(91,191,191,0.5);
}
.top-logo-name {
  font-family: 'Nunito', sans-serif;
  font-size: 17px;
  font-weight: 800;
  color: rgba(255,255,255,0.9);
}

/* ── REDIRECT OVERLAY ──────────────────────────── */
.redirect-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--navy-dark);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  animation: fadeIn 0.3s ease;
}
.redirect-overlay.visible { display: flex; }
.redirect-orb {
  width: 56px; height: 56px;
  border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
  background: radial-gradient(circle at 30% 30%, #fff 0%, #b8e8e8 35%, #5bbfbf 70%, #2a8080 100%);
  box-shadow: 0 0 32px rgba(91,191,191,0.7);
  animation: orbShape 7s ease-in-out infinite, orbFloat 4s ease-in-out infinite, orbPulse 1.2s ease-in-out infinite;
}
@keyframes orbPulse {
  0%, 100% { box-shadow: 0 0 32px rgba(91,191,191,0.7); }
  50% { box-shadow: 0 0 60px rgba(91,191,191,0.95), 0 0 100px rgba(91,191,191,0.3); }
}
.redirect-text {
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
}
</style>
</head>
<body>

<div class="bg"></div>

<a class="top-logo" href="#">
  <div class="top-logo-orb"></div>
  <span class="top-logo-name">Arelo</span>
</a>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="orb"></div>
      <div class="brand-name">Welcome to Arelo</div>
      <div class="brand-tagline">calm · invisible · yours</div>
    </div>

    <div class="card-body">
      <div class="sign-in-label">Sign in with</div>

      <!-- Status / error message -->
      <div id="statusMsg" class="status-msg" role="alert" aria-live="polite">
        <div class="spinner" id="statusSpinner" style="display:none;"></div>
        <span id="statusText"></span>
      </div>

      <!-- Google OAuth -->
      <button class="oauth-btn google" id="btnGoogle" onclick="signInWith('google')" aria-label="Sign in with Google">
        <!-- Google G logo SVG -->
        <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="btn-text">Continue with Google</span>
        <span class="btn-badge">Gmail / Google Workspace</span>
      </button>

      <!-- Azure / Microsoft OAuth -->
      <button class="oauth-btn azure" id="btnAzure" onclick="signInWith('azure')" aria-label="Sign in with Microsoft">
        <!-- Microsoft logo SVG -->
        <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="1"  y="1"  width="10.5" height="10.5" fill="#F25022"/>
          <rect x="12.5" y="1"  width="10.5" height="10.5" fill="#7FBA00"/>
          <rect x="1"  y="12.5" width="10.5" height="10.5" fill="#00A4EF"/>
          <rect x="12.5" y="12.5" width="10.5" height="10.5" fill="#FFB900"/>
        </svg>
        <span class="btn-text">Continue with Microsoft</span>
        <span class="btn-badge">Outlook / Azure AD</span>
      </button>

      <div class="divider"><span>secure sign-in</span></div>

      <p class="footer-note">
        By signing in you agree to Arelo's
        <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.<br>
        Your email data is only used to run Arelo — never shared.
      </p>
    </div>
  </div>
</div>

<!-- Full-screen loading overlay shown while redirecting -->
<div class="redirect-overlay" id="redirectOverlay">
  <div class="redirect-orb"></div>
  <div class="redirect-text" id="redirectText">Opening your dashboard…</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION — fill these in with your OAuth client IDs / redirect URIs
// ─────────────────────────────────────────────────────────────────────────────
window.ARELO_TOKEN_EXCHANGE_URL = 'https://hook.eu1.make.com/szuwf2br9vmhcl5xkv8kx2j30qixhlkc';
const CONFIG = {
  // Google OAuth 2.0
  google: {
 clientId: window.GOOGLE_CLIENT_ID || '474105460149-tmi74lcvs5uh2f5or1ogrsmvknfbpvh7.apps.googleusercontent.com',
    window.location.href.split('?')[0]: window.GOOGLE_REDIRECT_URI || window.location.origin + '/auth/callback/google',
    scope:      'openid email profile https://www.googleapis.com/auth/gmail.readonly',
    authUrl:     'https://accounts.google.com/o/oauth2/v2/auth',
  },
  // Microsoft / Azure AD
  azure: {
    clientId:    window.AZURE_CLIENT_ID    || 'YOUR_AZURE_CLIENT_ID',
    tenantId:    window.AZURE_TENANT_ID    || 'common',   // 'common' = any MS account
    window.location.href.split('?')[0]: window.AZURE_REDIRECT_URI || window.location.origin + '/auth/callback/azure',
    scope:       'openid email profile offline_access',
    get authUrl() {
      return `https://login.microsoftonline.com/${this.tenantId}/oauth2/v2.0/authorize`;
    },
  },
  // Where the dashboard lives (used for post-login redirect)
  dashboardUrl: window.ARELO_DASHBOARD_URL || './arelo_dashboard.html',
};

// ─────────────────────────────────────────────────────────────────────────────
// PKCE helpers (no client secret needed in the browser)
// ─────────────────────────────────────────────────────────────────────────────
function generateRandomString(len = 64) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function generateCodeChallenge(verifier) {
  const enc = new TextEncoder();
  const hash = await crypto.subtle.digest('SHA-256', enc.encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

// ─────────────────────────────────────────────────────────────────────────────
// SIGN-IN — builds the OAuth URL and redirects
// ─────────────────────────────────────────────────────────────────────────────
async function signInWith(provider) {
  const cfg = CONFIG[provider];
  if (!cfg) return;

  // Validate config
  if (cfg.clientId.startsWith('YOUR_')) {
    showStatus('error', `${provider === 'google' ? 'Google' : 'Microsoft'} OAuth client ID is not yet configured. Add it to CONFIG in this file.`);
    return;
  }

  disableButtons(true);
  showStatus('loading', `Redirecting to ${provider === 'google' ? 'Google' : 'Microsoft'}…`, true);

  try {
    // PKCE
    const codeVerifier   = generateRandomString(64);
    const codeChallenge  = await generateCodeChallenge(codeVerifier);
    const state          = generateRandomString(32);

    // Persist PKCE state so the callback page can verify
    sessionStorage.setItem('arelo_oauth_state',    state);
    sessionStorage.setItem('arelo_oauth_verifier', codeVerifier);
    sessionStorage.setItem('arelo_oauth_provider', provider);

    const params = new URLSearchParams({
      client_id:             cfg.clientId,
      redirect_uri:          cfg.redirectUri,
      response_type:         'code',
      scope:                 cfg.scope,
      state,
      code_challenge:        codeChallenge,
      code_challenge_method: 'S256',
      ...(provider === 'google' && { access_type: 'offline', prompt: 'consent' }),
      ...(provider === 'azure'  && { response_mode: 'query' }),
    });

    window.location.href = `${cfg.authUrl}?${params}`;
  } catch (err) {
    console.error('OAuth redirect error:', err);
    showStatus('error', 'Something went wrong. Please try again.');
    disableButtons(false);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CALLBACK HANDLING — runs if this page is loaded with ?code= in the URL.
// In production you'd have a dedicated /auth/callback route; this is a
// fallback for single-page / direct-file deployments.
// ─────────────────────────────────────────────────────────────────────────────
async function handleOAuthCallback() {
  const params   = new URLSearchParams(window.location.search);
  const code     = params.get('code');
  const state    = params.get('state');
  const error    = params.get('error');
  const provider = sessionStorage.getItem('arelo_oauth_provider');

  if (!code && !error) return; // not a callback — normal page load

  // Clear URL params without reloading
  history.replaceState({}, '', window.location.pathname);

  if (error) {
    showStatus('error', `Sign-in was cancelled or failed (${error}). Please try again.`);
    return;
  }

  if (state !== sessionStorage.getItem('arelo_oauth_state')) {
    showStatus('error', 'Security check failed. Please try signing in again.');
    return;
  }

  showRedirectOverlay('Verifying your account…');

  try {
    // ── Exchange code for tokens ────────────────────────────────────────────
    // In production: POST to your backend endpoint, not directly to Google/MS
    // (client_secret must never be exposed in the browser).
    // Here we call your Make.com webhook which handles the exchange.
    const verifier = sessionStorage.getItem('arelo_oauth_verifier');
    const cfg      = CONFIG[provider] || {};

    // POST to your backend / Make webhook for token exchange
    const tokenRes = await fetch(window.ARELO_TOKEN_EXCHANGE_URL || '/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code,
        code_verifier: verifier,
        provider,
        redirect_uri: cfg.redirectUri,
        client_id: cfg.clientId,
      }),
    });

    if (!tokenRes.ok) throw new Error(`Token exchange failed: ${tokenRes.status}`);
    const tokenData = await tokenRes.json();

    // ── Extract user info ───────────────────────────────────────────────────
    const { email, name, access_token, refresh_token } = tokenData;

    if (!email) throw new Error('No email returned from token exchange');

    // ── Persist to localStorage (same keys the dashboard reads) ────────────
    localStorage.setItem('arelo_email',         email);
    localStorage.setItem('arelo_name',          name  || '');
    localStorage.setItem('arelo_provider',      provider);
    localStorage.setItem('arelo_access_token',  access_token  || '');
    localStorage.setItem('arelo_refresh_token', refresh_token || '');

    // Clear PKCE
    sessionStorage.removeItem('arelo_oauth_state');
    sessionStorage.removeItem('arelo_oauth_verifier');
    sessionStorage.removeItem('arelo_oauth_provider');

    // ── Redirect to dashboard ───────────────────────────────────────────────
    // Check if new or existing user
    const checkUser = await fetch(`https://cfnuvhvncoumakrogrdb.supabase.co/rest/v1/users?email=eq.${email}&select=email`, {
      headers: {
        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmbnV2aHZuY291bWFrcm9ncmRiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODAxNzU2MSwiZXhwIjoyMDkzNTkzNTYxfQ.rZjJHR0rvQdw_tdQOGrtT8uaGxzYyZt-VxOLCK4sT-Q',
        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmbnV2aHZuY291bWFrcm9ncmRiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODAxNzU2MSwiZXhwIjoyMDkzNTkzNTYxfQ.rZjJHR0rvQdw_tdQOGrtT8uaGxzYyZt-VxOLCK4sT-Q'
      }
    });
    const userData = await checkUser.json();

    if (userData.length === 0) {
      showRedirectOverlay(`Welcome${name ? ', ' + name.split(' ')[0] : ''}! Setting up your account…`);
      setTimeout(() => {
        window.location.href = './arelo_onboarding.html';
      }, 800);
    } else {
      showRedirectOverlay(`Welcome back${name ? ', ' + name.split(' ')[0] : ''}! Opening your dashboard…`);
      setTimeout(() => {
        window.location.href = CONFIG.dashboardUrl;
      }, 800);
    }

  } catch (err) {
    console.error('OAuth callback error:', err);
    hideRedirectOverlay();
    showStatus('error', 'Could not complete sign-in. Please try again.');
    disableButtons(false);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function showStatus(type, message, withSpinner = false) {
  const el       = document.getElementById('statusMsg');
  const textEl   = document.getElementById('statusText');
  const spinnerEl = document.getElementById('statusSpinner');
  el.className   = `status-msg visible ${type}`;
  textEl.textContent = message;
  spinnerEl.style.display = withSpinner ? 'block' : 'none';
}

function hideStatus() {
  document.getElementById('statusMsg').className = 'status-msg';
}

function disableButtons(disabled) {
  document.getElementById('btnGoogle').disabled = disabled;
  document.getElementById('btnAzure').disabled  = disabled;
}

function showRedirectOverlay(msg = 'Opening your dashboard…') {
  document.getElementById('redirectText').textContent = msg;
  document.getElementById('redirectOverlay').classList.add('visible');
}

function hideRedirectOverlay() {
  document.getElementById('redirectOverlay').classList.remove('visible');
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT — check if already signed in, or handle callback
// ─────────────────────────────────────────────────────────────────────────────
(function init() {
  // If already authenticated, go straight to the dashboard
  const existingEmail = localStorage.getItem('arelo_email');
  if (existingEmail && window.location.search === '') {
    showRedirectOverlay('You\'re already signed in — opening your dashboard…');
    setTimeout(() => { window.location.href = CONFIG.dashboardUrl; }, 600);
    return;
  }

  // Handle callback from OAuth provider
  handleOAuthCallback();
})();
</script>
